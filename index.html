<style>
:root{
  --green-900:#3f7212;
  --green-700:#5a9622;
  --green-500:#8fd14f;
  --green-300:#bce98a;
  --green-100:#e6f7cf;
  --green-50:#f7fdee;
  --cherry:#d63d3d;
  --cherry-dark:#a82828;
  --cream:#fffdf6;
  --ink:#3a4a2a;
  --shadow:0 6px 0 rgba(63,114,18,.18);
  --radius:26px;
  --font-kr:'Jua',sans-serif;
  --font-jp:'Mochiy Pop One',sans-serif;
  --font-latin:'Baloo 2',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-latin),var(--font-kr);
  background:var(--cream);
  color:var(--ink);
  overflow-x:hidden;
  min-height:100vh;
  background-image:radial-gradient(rgba(143,209,79,.14) 2.5px, transparent 2.5px);
  background-size:34px 34px;
}
html[lang="ja"] body{font-family:var(--font-latin),var(--font-jp)}
html[lang="ja"] [data-i18n],html[lang="ja"] input::placeholder{font-family:var(--font-jp)}
html[lang="ko"] [data-i18n],html[lang="ko"] input::placeholder{font-family:var(--font-kr)}

/* ---------- floating bg deco ---------- */
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-deco span{
  position:absolute;color:var(--green-300);opacity:.55;
  animation:floaty 7s ease-in-out infinite;
  user-select:none;
}
@keyframes floaty{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-22px) rotate(12deg)}
}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(255,253,246,.85);
  backdrop-filter:blur(10px);
  border-bottom:3px solid var(--green-100);
}
.header-inner{
  max-width:1080px;margin:0 auto;padding:12px 22px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.brand-logo{height:46px;width:auto;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.brand:hover .brand-logo{transform:scale(1.08) rotate(-2deg)}
.brand-fallback{display:none;align-items:center;gap:10px}
.brand:hover .brand-mascot{transform:rotate(-12deg) scale(1.12)}
.brand-mascot{width:42px;height:42px;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.brand-name{
  font-family:var(--font-latin);font-weight:800;font-size:1.7rem;letter-spacing:.04em;
  color:var(--green-700);
}
nav{display:flex;align-items:center;gap:8px}
.nav-link{
  font-size:1.02rem;text-decoration:none;color:var(--green-700);
  padding:8px 16px;border-radius:999px;border:2.5px solid transparent;
  transition:all .22s ease;
}
.nav-link:hover{background:var(--green-100);border-color:var(--green-300);transform:translateY(-2px)}

/* language toggle */
.lang-toggle{
  position:relative;display:flex;border:3px solid var(--green-900);
  border-radius:999px;background:#fff;overflow:hidden;cursor:pointer;
  box-shadow:0 4px 0 rgba(63,114,18,.2);
  transition:transform .15s ease,box-shadow .15s ease;
}
.lang-toggle:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(63,114,18,.2)}
.lang-toggle button{
  position:relative;z-index:2;border:0;background:transparent;cursor:pointer;
  font-family:var(--font-latin);font-weight:800;font-size:.92rem;
  padding:7px 15px;color:var(--green-700);transition:color .25s ease;
}
.lang-toggle button.active{color:#fff}
.lang-pill{
  position:absolute;top:0;bottom:0;width:50%;border-radius:999px;
  background:linear-gradient(180deg,var(--green-500),var(--green-700));
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:1;
}
.lang-toggle[data-lang="ja"] .lang-pill{transform:translateX(100%)}

/* share button */
.share-btn{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  border:3px solid var(--green-900);background:#fff;color:var(--green-700);
  cursor:pointer;display:grid;place-items:center;
  box-shadow:0 4px 0 rgba(63,114,18,.2);
  transition:transform .15s ease,box-shadow .15s ease,background .2s;
}
.share-btn:hover{background:var(--green-100);transform:translateY(-2px)}
.share-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(63,114,18,.2)}
.share-btn svg{width:18px;height:18px}

/* ---------- hero ---------- */
.hero{position:relative;z-index:1;text-align:center;padding:72px 20px 56px}
.hero-logo{max-width:min(460px,80vw);height:auto;display:block;margin:0 auto;
  filter:drop-shadow(0 10px 0 rgba(63,114,18,.12));
  animation:bob 4s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero-logo-text{
  display:none;font-family:var(--font-latin);font-weight:800;
  font-size:clamp(4rem,12vw,7.5rem);letter-spacing:.02em;line-height:1;
  color:var(--green-700);
  text-shadow:0 8px 0 rgba(63,114,18,.12);
  animation:bob 4s ease-in-out infinite;
}
.hero-hello{
  display:inline-block;margin-top:26px;font-size:1.15rem;color:var(--green-700);
  background:#fff;border:3px solid var(--green-300);border-radius:999px;
  padding:9px 24px;box-shadow:var(--shadow);
}
.hero-tagline{margin-top:16px;font-size:1.28rem;color:var(--ink)}
.hero-badges{margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.badge{
  font-family:var(--font-latin);font-weight:700;font-size:.86rem;letter-spacing:.06em;
  background:var(--green-100);color:var(--green-900);
  border:2.5px solid var(--green-500);border-radius:999px;padding:6px 16px;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .2s;
  cursor:default;
}
.badge:hover{transform:scale(1.12) rotate(-3deg);background:var(--green-300)}

/* ---------- sections ---------- */
section{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:44px 22px}
.section-title{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin-bottom:8px;
}
.section-title h2{
  font-family:var(--font-latin);font-weight:800;font-size:2.2rem;letter-spacing:.08em;
  color:var(--green-700);
  text-shadow:0 4px 0 rgba(63,114,18,.12);
}
.section-title .star{color:var(--green-500);font-size:1.5rem;animation:twinkle 1.8s ease-in-out infinite}
.section-title .star:last-child{animation-delay:.9s}
@keyframes twinkle{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.55);opacity:.45}}
.section-sub{text-align:center;color:var(--green-700);margin-bottom:30px;font-size:1.05rem}

/* ---------- add video form (edit mode only) ---------- */
body:not(.admin) .admin-only{display:none !important}
.add-bar{
  display:flex;gap:10px;max-width:640px;margin:0 auto 36px;
}
.export-row{text-align:center;margin:-24px 0 32px}
.export-row .chip{display:inline-block;flex:none;padding:8px 24px}
.add-bar input{
  flex:1;min-width:0;font-size:1rem;font-family:inherit;color:var(--ink);
  background:#fff;border:3px solid var(--green-300);border-radius:999px;
  padding:13px 22px;outline:none;
  transition:border-color .2s,box-shadow .2s,transform .2s;
  box-shadow:0 4px 0 rgba(63,114,18,.1);
}
.add-bar input:focus{border-color:var(--green-500);box-shadow:0 4px 0 rgba(63,114,18,.22);transform:translateY(-2px)}
.btn{
  font-family:inherit;font-size:1.02rem;cursor:pointer;border:3px solid var(--green-900);
  background:linear-gradient(180deg,var(--green-500),var(--green-700));color:#fff;
  border-radius:999px;padding:12px 28px;white-space:nowrap;
  box-shadow:0 5px 0 var(--green-900);
  transition:transform .12s ease,box-shadow .12s ease,filter .2s;
}
.btn:hover{filter:brightness(1.07)}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--green-900)}
.btn:disabled{opacity:.55;cursor:wait;transform:none}
.btn.cherry{background:linear-gradient(180deg,var(--cherry),var(--cherry-dark));border-color:var(--cherry-dark);box-shadow:0 5px 0 var(--cherry-dark)}
.btn.cherry:active{box-shadow:0 1px 0 var(--cherry-dark)}

/* ---------- video grid ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:26px}
.card{
  background:#fff;border:3px solid var(--green-300);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s,border-color .25s;
  opacity:0;transform:translateY(26px);
  position:relative;
}
.card.shown{opacity:1;transform:translateY(0)}
.card:hover{transform:translateY(-7px) rotate(-.6deg);border-color:var(--green-500);box-shadow:0 13px 0 rgba(63,114,18,.16)}
body.admin .card{cursor:grab}
body.admin .card:active{cursor:grabbing}
.card.dragging{opacity:.45;transform:rotate(2.5deg) scale(.96);border-style:dashed;border-color:var(--green-500);box-shadow:none}
.thumb{
  position:relative;aspect-ratio:16/9;cursor:pointer;overflow:hidden;
  background:var(--green-100);display:block;width:100%;border:0;padding:0;
}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .45s ease}
.card:hover .thumb img{transform:scale(1.08)}
.thumb .preview{
  position:absolute;inset:0;width:100%;height:100%;border:0;z-index:1;
  pointer-events:none;opacity:0;transition:opacity .45s ease;
}
.thumb .preview.on{opacity:1}
.play-bubble{
  position:absolute;inset:0;display:grid;place-items:center;z-index:2;
  background:rgba(63,114,18,0);transition:background .25s;
}
.card:hover .play-bubble{background:rgba(63,114,18,.25)}
.play-bubble span{
  width:62px;height:62px;border-radius:50%;display:grid;place-items:center;
  background:#fff;border:3px solid var(--green-900);color:var(--green-700);
  font-size:1.5rem;padding-left:5px;
  transform:scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 0 rgba(63,114,18,.25);
}
.card:hover .play-bubble span{transform:scale(1)}
.card-body{padding:16px 18px 18px}
.card-title{
  font-family:'Jua','Mochiy Pop One',var(--font-latin),sans-serif;
  font-size:1.06rem;line-height:1.45;color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  min-height:2.9em;
}
.card-actions{display:flex;gap:8px;margin-top:13px}
.chip{
  flex:1;text-align:center;text-decoration:none;cursor:pointer;font-family:inherit;
  font-size:.88rem;color:var(--green-900);background:var(--green-100);
  border:2.5px solid var(--green-300);border-radius:999px;padding:7px 10px;
  transition:all .18s ease;
}
.chip:hover{background:var(--green-300);transform:translateY(-2px)}
.chip.danger{color:var(--cherry-dark);background:#ffeaea;border-color:#f3bcbc}
.chip.danger:hover{background:#ffd4d4}

/* empty state */
.empty{
  text-align:center;padding:54px 20px;border:3px dashed var(--green-300);
  border-radius:var(--radius);background:rgba(255,255,255,.6);
}
.empty .mascot-big{width:110px;height:110px;margin:0 auto 16px;animation:bob 3s ease-in-out infinite}
.empty p{color:var(--green-700);font-size:1.12rem}

/* ---------- contact ---------- */
.contact-cards{display:flex;gap:22px;justify-content:center;flex-wrap:wrap}
.contact-card{
  display:flex;align-items:center;gap:16px;cursor:pointer;
  background:#fff;border:3px solid var(--green-300);border-radius:var(--radius);
  padding:20px 28px;min-width:280px;box-shadow:var(--shadow);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),border-color .25s,box-shadow .25s;
}
.contact-card:hover{transform:translateY(-6px) rotate(.8deg);border-color:var(--green-500);box-shadow:0 12px 0 rgba(63,114,18,.16)}
.contact-card:active{transform:translateY(0) scale(.97)}
.contact-icon{
  width:52px;height:52px;border-radius:18px;display:grid;place-items:center;flex-shrink:0;
  background:var(--green-100);border:2.5px solid var(--green-300);font-size:1.5rem;
}
.contact-info b{display:block;font-family:var(--font-latin);font-weight:800;letter-spacing:.05em;color:var(--green-700);font-size:.84rem}
.contact-info span{font-size:1.08rem;color:var(--ink)}
.contact-hint{font-size:.78rem;color:var(--green-500);margin-left:auto;align-self:flex-start}

/* ---------- footer ---------- */
footer{
  position:relative;z-index:1;text-align:center;padding:36px 20px 46px;
  color:var(--green-700);font-size:.95rem;
}
footer .footer-mascot{width:54px;height:54px;margin:0 auto 10px;display:block;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
footer .footer-mascot:hover{transform:rotate(360deg) scale(1.15)}

/* ---------- modal player ---------- */
.modal{
  position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:22px;
  background:rgba(58,74,42,.55);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
.modal.open{opacity:1;pointer-events:auto}
.modal-box{
  width:min(900px,100%);background:#fff;border:4px solid var(--green-900);
  border-radius:var(--radius);overflow:hidden;box-shadow:0 14px 0 rgba(0,0,0,.22);
  transform:scale(.85) translateY(30px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
.modal.open .modal-box{transform:scale(1) translateY(0)}
.modal-head{
  display:flex;align-items:center;gap:12px;padding:13px 18px;
  background:var(--green-100);border-bottom:3px solid var(--green-300);
}
.modal-head .dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.modal-head .dot.r{background:var(--cherry)}
.modal-head .dot.g{background:var(--green-500)}
.modal-title{flex:1;font-family:'Jua','Mochiy Pop One',var(--font-latin),sans-serif;font-size:.98rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-close{
  border:2.5px solid var(--green-900);background:#fff;border-radius:50%;
  width:34px;height:34px;cursor:pointer;font-size:1rem;color:var(--green-900);
  transition:transform .2s,background .2s;flex-shrink:0;
}
.modal-close:hover{background:var(--cherry);color:#fff;border-color:var(--cherry-dark);transform:rotate(90deg)}
.modal-video{aspect-ratio:16/9;background:#000}
.modal-video iframe{width:100%;height:100%;display:block;border:0}

/* ---------- toast ---------- */
#toast-zone{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none}
.toast{
  background:#fff;border:3px solid var(--green-900);border-radius:999px;
  padding:11px 26px;font-size:1rem;color:var(--ink);
  box-shadow:0 5px 0 rgba(63,114,18,.25);
  animation:toast-in .35s cubic-bezier(.34,1.56,.64,1),toast-out .3s ease 2.4s forwards;
  display:flex;align-items:center;gap:9px;
}
.toast.err{border-color:var(--cherry-dark);box-shadow:0 5px 0 rgba(168,40,40,.25)}
@keyframes toast-in{from{transform:translateY(40px) scale(.7);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@keyframes toast-out{to{transform:translateY(20px) scale(.85);opacity:0}}

/* melon rain (secret code) */
.melon-rain{
  position:fixed;top:-80px;z-index:300;pointer-events:none;
  animation:melon-fall linear forwards;
}
@keyframes melon-fall{to{transform:translateY(118vh) rotate(var(--rot,360deg))}}

/* click sparkles */
.spark{
  position:fixed;z-index:300;pointer-events:none;font-size:15px;color:var(--green-500);
  animation:spark-pop .7s ease-out forwards;user-select:none;
}
@keyframes spark-pop{
  0%{transform:translate(0,0) scale(0) rotate(0deg);opacity:1}
  70%{opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(1.25) rotate(160deg);opacity:0}
}

/* scroll reveal */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s cubic-bezier(.34,1.56,.64,1)}
.reveal.shown{opacity:1;transform:translateY(0)}

/* ---------- FAQ chat ---------- */
.chat-fab{
  position:fixed;right:22px;bottom:22px;z-index:95;
  width:62px;height:62px;border-radius:50%;cursor:pointer;
  border:3px solid var(--green-900);
  background:linear-gradient(180deg,#fff,var(--green-100));
  display:grid;place-items:center;
  box-shadow:0 6px 0 rgba(63,114,18,.25);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
}
.chat-fab:hover{transform:scale(1.1) rotate(-6deg)}
.chat-fab:active{transform:translateY(4px) scale(.95);box-shadow:0 1px 0 rgba(63,114,18,.25)}
.chat-fab svg{width:40px;height:40px}
.chat-fab .fab-badge{
  position:absolute;top:-3px;right:-3px;width:18px;height:18px;border-radius:50%;
  background:var(--cherry);border:2.5px solid #fff;
}
.chat-panel{
  position:fixed;right:22px;bottom:96px;z-index:95;
  width:min(350px,calc(100vw - 34px));height:min(490px,calc(100vh - 130px));
  background:var(--cream);border:3px solid var(--green-900);border-radius:24px;
  box-shadow:0 10px 0 rgba(63,114,18,.2);
  display:flex;flex-direction:column;overflow:hidden;
  opacity:0;pointer-events:none;transform:translateY(24px) scale(.9);transform-origin:bottom right;
  transition:opacity .25s ease,transform .3s cubic-bezier(.34,1.56,.64,1);
}
.chat-panel.open{opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}
.chat-head{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--green-100);border-bottom:3px solid var(--green-300);
}
.chat-head svg{width:30px;height:30px}
.chat-head b{font-family:var(--font-latin);font-weight:800;color:var(--green-700);letter-spacing:.05em;font-size:1.05rem}
.chat-head .status{margin-left:auto;font-size:.75rem;color:var(--green-700);display:flex;align-items:center;gap:5px}
.chat-head .status::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--green-500);animation:twinkle 2s ease-in-out infinite}
.chat-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.chat-body::-webkit-scrollbar{width:8px}
.chat-body::-webkit-scrollbar-thumb{background:var(--green-300);border-radius:99px}
.msg{
  max-width:84%;padding:10px 14px;border-radius:18px;font-size:.94rem;line-height:1.55;
  font-family:'Jua','Mochiy Pop One',var(--font-latin),sans-serif;
  animation:msg-pop .32s cubic-bezier(.34,1.56,.64,1);word-break:break-word;
  white-space:pre-line;
}
.msg.bot{align-self:flex-start;background:#fff;border:2.5px solid var(--green-300);border-bottom-left-radius:6px;color:var(--ink)}
.msg.user{align-self:flex-end;background:linear-gradient(180deg,var(--green-500),var(--green-700));border:2.5px solid var(--green-900);color:#fff;border-bottom-right-radius:6px}
@keyframes msg-pop{from{transform:translateY(12px) scale(.85);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.msg.typing{display:flex;gap:5px;align-items:center;padding:13px 16px}
.msg.typing i{width:7px;height:7px;border-radius:50%;background:var(--green-500);animation:tdot 1s ease-in-out infinite}
.msg.typing i:nth-child(2){animation-delay:.15s}
.msg.typing i:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-chips{display:flex;flex-direction:column;gap:7px;align-items:flex-end;animation:msg-pop .32s cubic-bezier(.34,1.56,.64,1)}
.chat-chips button{
  font-family:'Jua','Mochiy Pop One',var(--font-latin),sans-serif;

let lang = localStorage.getItem('mero_lang') || 'ja';
const t = key => (I18N[lang] && I18N[lang][key]) || I18N.ko[key] || key;

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('langToggle').dataset.lang = lang;
  document.getElementById('btnKo').classList.toggle('active', lang === 'ko');
  document.getElementById('btnJa').classList.toggle('active', lang === 'ja');
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
  renderVideos(); // refresh chip labels
}
function setLang(next) {
  if (lang === next) return;
  lang = next;
  localStorage.setItem('mero_lang', lang);
  applyLang();
  resetChat(); // 챗봇도 새 언어로 다시 시작
}
document.getElementById('btnKo').addEventListener('click', () => setLang('ko'));
document.getElementById('btnJa').addEventListener('click', () => setLang('ja'));

/* ============ toast ============ */
function toast(msg, isErr = false) {
  const el = document.createElement('div');
  el.className = 'toast' + (isErr ? ' err' : '');
  el.textContent = msg;
  document.getElementById('toast-zone').appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

/* ============ video store ============ */
/* 사이트를 웹에 공개할 때는, 편집 모드의 "목록 내보내기"로 복사한 JSON을
   아래 SEED_VIDEOS 대괄호 안에 붙여넣으면 방문자에게도 같은 목록이 보입니다. */
const SEED_VIDEOS = [
  { "id": "_t4OxKtCHrg", "title": "舞台に立って(무대에 서서) - YOASOBIㅣ아카네 리제(Akane Lize) 【COVER】" },

  { "id": "L-pn_xrqQkQ", "title": "Hollowness - 「미나미 / 美波」ㅣ아카네 리제(Akane Lize) 【COVER】" },
  { "id": "LxqwR1KE81o", "title": "Acacia (BUMP OF CHICKEN) / Pokémon GOTCHA！| 시라유키 히나 Cover" },
  { "id": "X4nHbp5Rm08", "title": "한 페이지가 될 수 있게 [DAY6]ㅣ아라하시 타비X네코타 츠나 「COVER」" },
  { "id": "8npfInLsGz4", "title": "Highlight / パワフルプロ野球2026-2027主題歌 - 鷲羽アスカ（Cover）" },
  { "id": "2ih4A9lP8pA", "title": "꿈의 악마 - 「Dream Capture」 Official MV │ 꿈을 파는 가게 OST" },
  { "id": "7X6dDcbfzH4", "title": "BAD (Arranged Ver.) - 유람(Yuram) 【COVER】" },
  { "id": "8QXJtwJ15S0", "title": "【歌ってみた】JANE DOE【covered by 汐鳴みりね / ななしいんく】" },
  { "id": "N1_OE0bcL3c", "title": "【歌ってみた】プロポーズ / covered by #花冠あむる【内緒のピアス】" }
];
/* 편집 모드 ON: 내 브라우저에 저장된 개인 목록 / OFF: 방문자에게 보이는 공식 목록(SEED) */
let videos = [];
const seedSig = () => SEED_VIDEOS.map(v => v.id).join(',');
function loadVideos() {
  if (editMode) {
    try {
      const saved = JSON.parse(localStorage.getItem('mero_videos') || 'null');
      const base = localStorage.getItem('mero_videos_base');
      /* 저장해 둔 편집본은 공식 목록(SEED)이 그대로일 때만 이어서 보여줘요.
         새 영상이 SEED에 푸시돼서 base가 달라졌으면, 최신 공식 목록으로 새로 시작합니다. */
      if (Array.isArray(saved) && saved.length && base === seedSig()) return saved;
    } catch (e) {}
  }
  return SEED_VIDEOS.slice();
}
const saveVideos = () => {
  localStorage.setItem('mero_videos', JSON.stringify(videos));
  localStorage.setItem('mero_videos_base', seedSig());
};

function parseYouTubeId(url) {
  try {
    const u = new URL(url.trim());
    const host = u.hostname.replace(/^www\.|^m\./, '');
    if (host === 'youtu.be') return u.pathname.slice(1).split('/')[0] || null;
    if (host === 'youtube.com' || host === 'youtube-nocookie.com') {
      if (u.pathname === '/watch') return u.searchParams.get('v');
      const m = u.pathname.match(/^\/(shorts|embed|live|v)\/([\w-]{6,})/);
      if (m) return m[2];
    }
  } catch (e) {}
  return null;
}

async function fetchTitle(id) {
  const watchUrl = `https://www.youtube.com/watch?v=${id}`;
  const endpoints = [
    `https://www.youtube.com/oembed?format=json&url=${encodeURIComponent(watchUrl)}`,
    `https://noembed.com/embed?url=${encodeURIComponent(watchUrl)}`
  ];
  for (const ep of endpoints) {
    try {
      const r = await fetch(ep);
      if (r.ok) {
        const d = await r.json();
        if (d && d.title) return d.title;
      }
    } catch (e) {}
  }
  return null;
}

/* ============ render ============ */
let dragMoved = false;
document.getElementById('videoGrid').addEventListener('dragover', e => {
  if (editMode) e.preventDefault();
});
function renderVideos() {
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = '';
  document.getElementById('emptyState').hidden = videos.length > 0;

  videos.forEach((v, i) => {
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML = `
      <button class="thumb" type="button" aria-label="play">
        <img loading="lazy" draggable="false" src="https://i.ytimg.com/vi/${v.id}/maxresdefault.jpg"
             onerror="this.onerror=null;this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'" alt="">
        <span class="play-bubble"><span>▶</span></span>
      </button>
      <div class="card-body">
        <p class="card-title"></p>
        <div class="card-actions">
          <a class="chip" target="_blank" rel="noopener" draggable="false"
             href="https://www.youtube.com/watch?v=${v.id}">${t('chip_watch')}</a>
          <button class="chip danger admin-only" type="button">${t('chip_delete')}</button>
        </div>
      </div>`;
    card.querySelector('.card-title').textContent = v.title || t('untitled');

    /* hover preview: 잠시 머무르면 음소거 미리보기 재생 */
    const thumbEl = card.querySelector('.thumb');
    let pvTimer = null, pv = null;
    const stopPreview = () => {
      clearTimeout(pvTimer);
      if (pv) { pv.remove(); pv = null; }
    };
    thumbEl.addEventListener('mouseenter', () => {
      pvTimer = setTimeout(() => {
        pv = document.createElement('iframe');
        pv.className = 'preview';
        pv.src = `https://www.youtube-nocookie.com/embed/${v.id}?autoplay=1&mute=1&controls=0&rel=0&playsinline=1&loop=1&playlist=${v.id}`;
        pv.allow = 'autoplay; encrypted-media';
        pv.tabIndex = -1;
        pv.addEventListener('load', () => { if (pv) pv.classList.add('on'); });
        thumbEl.appendChild(pv);
      }, 550);
    });
    thumbEl.addEventListener('mouseleave', stopPreview);
    thumbEl.addEventListener('click', () => { stopPreview(); openPlayer(v); });

    /* drag reorder (편집 모드 전용) */
    card.dataset.id = v.id;
    card.draggable = true;
    card.addEventListener('dragstart', e => {
      if (!editMode) { e.preventDefault(); return; }
      stopPreview();
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', v.id);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      if (dragMoved) {
        dragMoved = false;
        saveVideos();
        toast(t('toast_order'));
      }
    });
    card.addEventListener('dragenter', () => {
      const draggingEl = grid.querySelector('.dragging');
      if (!editMode || !draggingEl || draggingEl === card) return;
      const from = videos.findIndex(x => x.id === draggingEl.dataset.id);
      const to = videos.findIndex(x => x.id === v.id);
      if (from < 0 || to < 0) return;
      videos.splice(to, 0, videos.splice(from, 1)[0]);
      if (from < to) card.after(draggingEl); else card.before(draggingEl);
      dragMoved = true;
    });
    card.querySelector('.chip.danger').addEventListener('click', () => {
      if (!confirm(t('confirm_delete'))) return;
      videos = videos.filter(x => x.id !== v.id);
      saveVideos();
      renderVideos();
      toast(t('toast_deleted'));
    });
    grid.appendChild(card);
    setTimeout(() => card.classList.add('shown'), 40 * i + 30);
  });
}

/* ============ add video ============ */
document.getElementById('addForm').addEventListener('submit', async e => {
  e.preventDefault();
  const input = document.getElementById('urlInput');
  const btn = document.getElementById('addBtn');
  const id = parseYouTubeId(input.value);
  if (!id) { toast(t('toast_invalid'), true); input.focus(); return; }
  if (videos.some(v => v.id === id)) { toast(t('toast_dup'), true); return; }

  btn.disabled = true;
  btn.textContent = t('add_loading');
  const title = await fetchTitle(id);
  btn.disabled = false;
  btn.textContent = t('add_btn');

  videos.unshift({ id, title: title || '' });
  saveVideos();
  input.value = '';
  renderVideos();
  toast(title ? t('toast_added') : t('toast_titlefail'), !title);
});

/* ============ player modal ============ */
const modal = document.getElementById('playerModal');
function openPlayer(v) {
  document.getElementById('modalTitle').textContent = v.title || t('untitled');
  document.getElementById('modalVideo').innerHTML =
    `<iframe src="https://www.youtube-nocookie.com/embed/${v.id}?autoplay=1&rel=0"
       title="player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}
function closePlayer() {
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
  setTimeout(() => { document.getElementById('modalVideo').innerHTML = ''; }, 280);
}
document.getElementById('modalClose').addEventListener('click', closePlayer);
modal.addEventListener('click', e => { if (e.target === modal) closePlayer(); });

/* ============ clipboard helper ============ */
async function copyText(text) {
  try { await navigator.clipboard.writeText(text); }
  catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  }
}

/* ============ scroll reveal ============ */
const io = new IntersectionObserver(entries => {
  entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('shown'); io.unobserve(en.target); } });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

const chatPanel = document.getElementById('chatPanel');
const chatBody = document.getElementById('chatBody');
let chatStarted = false, chatBusy = false;

function chatMsg(cls, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  chatBody.appendChild(d);
  chatBody.scrollTop = chatBody.scrollHeight;
  return d;
}
function chatChips() {
  const wrap = document.createElement('div');
  wrap.className = 'chat-chips';
  FAQ.forEach(item => {
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = item.q[lang] || item.q.ko;
    b.addEventListener('click', () => askFaq(item, wrap));
    wrap.appendChild(b);
  });
  chatBody.appendChild(wrap);
  chatBody.scrollTop = chatBody.scrollHeight;
}
function askFaq(item, chipsEl) {
  if (chatBusy) return;
  chatBusy = true;
  chipsEl.remove();
  chatMsg('user', item.q[lang] || item.q.ko);
  const tp = document.createElement('div');
  tp.className = 'msg bot typing';
  tp.innerHTML = '<i></i><i></i><i></i>';
  setTimeout(() => { chatBody.appendChild(tp); chatBody.scrollTop = chatBody.scrollHeight; }, 350);
  setTimeout(() => {
    tp.remove();
    chatMsg('bot', item.a[lang] || item.a.ko);
    setTimeout(() => {
      chatMsg('bot', t('chat_more'));
      chatChips();
      chatBusy = false;
    }, 600);
  }, 1500);
}
function startChat() {
  if (chatStarted) return;
  chatStarted = true;
  chatMsg('bot', t('chat_greet'));
  chatChips();
}
function resetChat() {
  chatBody.innerHTML = '';
  chatStarted = false;
  chatBusy = false;
  if (chatPanel.classList.contains('open')) startChat();
}
document.getElementById('chatFab').addEventListener('click', () => {
  const open = chatPanel.classList.toggle('open');
  chatPanel.setAttribute('aria-hidden', String(!open));
  if (open) startChat();
});
